name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Setup game folder with SMAPI
        run: |
          GAME=/tmp/stardew
          mkdir -p "$GAME"

          # NuGet cache'den ModBuildConfig paketini bul
          PKG=$(find ~/.nuget/packages/pathoschild.stardew.modbuildconfig -name "*.nupkg" 2>/dev/null | head -1)

          # SMAPI DLL'lerini NuGet paketinden çıkar
          NUGET_DIR=$(find ~/.nuget/packages/pathoschild.stardew.modbuildconfig -type d | head -1)
          echo "NuGet dir: $NUGET_DIR"
          ls "$NUGET_DIR" || true

          # Stardew Valley stub DLL'leri oluştur (boş assembly)
          cat > /tmp/stub.cs << 'EOF'
          namespace StardewValley { public class Game1 {} }
          EOF

          # SMAPI'yi GitHub Releases'tan indir (linux build)
          curl -sL "https://github.com/Pathoschild/SMAPI/releases/download/4.1.10/SMAPI-4.1.10-installer.zip" -o /tmp/smapi.zip
          cd /tmp && unzip -q smapi.zip -d smapi_out
          find /tmp/smapi_out -name "*.dll" | head -20

          # internal klasörü oluştur (SMAPI kontrolü için)
          mkdir -p "$GAME/smapi-internal"

          # DLL'leri kopyala
          find /tmp/smapi_out -name "StardewModdingAPI.dll" -exec cp {} "$GAME/" \;
          find /tmp/smapi_out -name "Stardew Valley.dll" -exec cp {} "$GAME/" \;
          find /tmp/smapi_out -name "*.dll" -path "*/linux*" -exec cp {} "$GAME/" \; 2>/dev/null || true

          ls "$GAME/"

      - name: Build
        run: dotnet build --configuration Release /p:GamePath="/tmp/stardew" /p:EnableModDeploy=false /p:EnableModZip=true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Find zip
        id: zip
        run: |
          ZIP=$(find bin/Release -name "*.zip" | head -1)
          echo "ZIP_PATH=$ZIP" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: "Release v${{ steps.version.outputs.VERSION }}"
          files: ${{ steps.zip.outputs.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Nexus Mods
        run: |
          curl -X POST \
            "https://api.nexusmods.com/v1/games/stardewvalley/mods/${{ secrets.NEXUS_MOD_ID }}/files.json" \
            -H "apikey: ${{ secrets.NEXUS_API_KEY }}" \
            -F "category=MAIN" \
            -F "version=${{ steps.version.outputs.VERSION }}" \
            -F "name=Season Planner and Bundle Reminder" \
            -F "file=@${{ steps.zip.outputs.ZIP_PATH }};type=application/zip"
